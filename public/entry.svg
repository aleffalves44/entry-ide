<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Entry IDE — terminal prompt as "entry point" mark -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e2130"/>
      <stop offset="1" stop-color="#12141d"/>
    </linearGradient>
  </defs>
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="200" fill="none" stroke="#2c3040" stroke-width="8"/>
  <!-- chevron ❯ -->
  <path d="M 300 320 L 520 512 L 300 704"
        fill="none" stroke="#10b981" stroke-width="96"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- cursor underscore -->
  <rect x="600" y="656" width="180" height="96" rx="28" fill="#10b981" opacity="0.55"/>
</svg>
